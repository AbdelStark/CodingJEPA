name: nightly

on:
  schedule:
    # Daily at 02:00 UTC — long enough after most merges to be quiet,
    # early enough that results are ready before the EU/US working day.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nightly-slow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Prepare nightly diagnostics directory
        id: prep
        run: |
          date_dir="$(date -u +%Y-%m-%d)"
          out_dir="tests/fixtures/nightly/${date_dir}"
          mkdir -p "${out_dir}"
          echo "out_dir=${out_dir}" >> "$GITHUB_OUTPUT"
          echo "date_dir=${date_dir}" >> "$GITHUB_OUTPUT"

      - name: pytest -m slow (capture exit code)
        id: pytest
        continue-on-error: true
        env:
          CODINGJEPA_NIGHTLY_DIAG_DIR: ${{ steps.prep.outputs.out_dir }}
        run: |
          set +e
          uv run pytest \
            -m slow \
            --junitxml=nightly-report.xml \
            -v \
            --tb=short
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload nightly junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-junit
          path: nightly-report.xml
          retention-days: 30

      - name: Upload per-diagnostic JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-diagnostics-${{ steps.prep.outputs.date_dir }}
          path: ${{ steps.prep.outputs.out_dir }}
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on tracking issue #3 on failure
        if: steps.pytest.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const dateDir = '${{ steps.prep.outputs.date_dir }}';
            const exitCode = '${{ steps.pytest.outputs.exit_code }}';
            const body = [
              `### Nightly slow-test run failed (${dateDir})`,
              ``,
              `- Workflow run: ${runUrl}`,
              `- pytest exit code: \`${exitCode}\``,
              `- Artifacts: \`nightly-junit\`, \`nightly-diagnostics-${dateDir}\``,
              ``,
              `_Posted automatically by \`.github/workflows/nightly.yml\` (#23)._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 3,
              body,
            });
