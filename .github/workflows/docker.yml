name: docker

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.eval"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "Dockerfile.eval"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Build-only smoke test of Dockerfile.eval. No push to GHCR — that happens in the
    # release runbook (docs/spec/09-release-and-versioning.md §Release procedure).
    # No GPU required: this validates the Dockerfile compiles and `uv sync --frozen`
    # resolves cleanly.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile.eval
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.eval
          tags: codingjepa-eval:test
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

