name: eval-smoke

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  eval-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: pytest tests/eval/
        run: |
          uv run pytest \
            tests/eval/ \
            --maxfail=3 \
            --tb=short \
            -q \
            --junitxml=eval-smoke-report.xml

      - name: Upload junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-junit
          path: eval-smoke-report.xml
          retention-days: 14
